{% extends 'forum/base.html' %}

{% block content %}
<section class="section">   
    <h2>Forum - Share Information</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Your name" required>
        <textarea name="text" placeholder="Your message" required></textarea>
        <button type="submit">Post</button>
    </form>
    {% for msg in messages %}
        <p><strong>{{ msg.username }}:</strong>{{ msg.text }}<br>
        <small>{{ msg.date }}</small></p>
        <hr>
    {% empty %}
        <p>No messages yet.</p>
    {% endfor %}
</section>
{% endblock %}
